name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
      # Trusted Publishing requires npm >= 11.5.1
      - run: npm install -g npm@latest
      - run: npm ci
      # prepublishOnly runs build + coverage; provenance is attached automatically via OIDC
      - run: npm publish
