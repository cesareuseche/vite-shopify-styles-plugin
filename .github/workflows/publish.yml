name: Publish

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # npm Trusted Publishing (OIDC) — no NPM_TOKEN secret needed

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      # Node 24 bundles npm 11.12+, already above Trusted Publishing's >= 11.5.1
      # OIDC floor. We deliberately do NOT run `npm install -g npm@latest`: npm's
      # in-place self-upgrade is a known broken race that crashes mid-rebuild with
      # MODULE_NOT_FOUND (e.g. 'sigstore'/'promise-retry').
      - run: npm ci
      - run: npm run build
      - run: npm run test:coverage
      # Idempotency guard: re-pushed or backfilled tags must not fail on an already-published version
      - name: Check if version is already on the registry
        id: check
        run: |
          PKG=$(node -p "require('./package.json').name")
          VER=$(node -p "require('./package.json').version")
          if npm view "$PKG@$VER" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$PKG@$VER already published — skipping"
          fi
      - name: Publish to npm
        if: steps.check.outputs.published != 'true'
        run: npm publish --access public --provenance --ignore-scripts
